# Turn on logging, and set ZMK logging to debug output
CONFIG_ZMK_USB_LOGGING=n

# These are troubleshooting items
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_BAS=n

# Set max number of BT connections
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

CONFIG_ZMK_KEYBOARD_NAME="Trackball v.3"


# Settings for PMW3610 driver from https://github.com/AntoineGS/zmk-pmw3610-driver 
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
#CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_PMW3610=y
CONFIG_PM_DEVICE=y
CONFIG_PMW3610_PM=y
CONFIG_PMW3610_ACCELERATION_ALGORITHM=2 # 0: disabled, 1: quadratic, 2: sigmoid
CONFIG_PMW3610_ACCELERATION_SENSITIVITY=10 # 1-100
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_INVERT_Y=y

CONFIG_PMW3610_CPI=1000
#Default 800 range 200..3200 with 200 step