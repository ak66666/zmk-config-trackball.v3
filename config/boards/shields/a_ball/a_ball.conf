# Set max number of BT connections
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

CONFIG_ZMK_KEYBOARD_NAME="Trackball v.3"



CONFIG_SPI=y
CONFIG_INPUT=y
